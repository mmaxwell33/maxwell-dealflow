name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Cancel older runs of the same workflow on the same ref — saves runner
# minutes when someone pushes a fix-up commit.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: vitest + playwright + axe
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run Vitest (unit tests)
        run: npm test

      - name: Install Playwright browser (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Start static server
        run: |
          npx --yes serve -l 3000 . &
          # Wait for the server to actually be ready before continuing.
          npx --yes wait-on http://localhost:3000 --timeout 30000

      - name: Run Playwright + axe smoke
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: npx playwright test

      - name: Upload Playwright report (only on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 5

