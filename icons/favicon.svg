<?xml version="1.0" encoding="UTF-8"?>
<!--
  Favicon — Maxwell Midodzi, REALTOR® at eXp Realty.
  Used in browser tabs, bookmarks, and the address bar across all site pages.

  Design: deep-navy tile with the white "Rowhouse MM" mark — two gabled
  M-houses sharing a party wall (M·M = Maxwell Midodzi = two joined homes),
  the same mark used in the site nav and IG tile. Navy + white two-colour
  brand, Chair-approved July 2026 (brand board session). Sharp corners on
  purpose — editorial, not app-icon. Paths only (no <text>) so it renders
  identically in every browser tab.

  NOTE: this SVG is safe to change — it is NOT referenced by manifest.json
  or precached by the service worker. The PNG icons in this folder belong
  to the installed DealFlow PWA and must not be replaced in place.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Maxwell Midodzi">
  <rect width="32" height="32" rx="1.5" ry="1.5" fill="#0F172A"/>
  <g fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linejoin="miter">
    <path d="M4.4 23.4 L4.4 12.4 L9.9 8.8 L15.4 12.4 L15.4 23.4"/>
    <path d="M4.4 12.4 L9.9 15.5 L15.4 12.4"/>
    <path d="M15.4 12.4 L20.9 8.8 L26.4 12.4 L26.4 23.4"/>
    <path d="M15.4 12.4 L20.9 15.5 L15.4 12.4"/>
  </g>
</svg>
