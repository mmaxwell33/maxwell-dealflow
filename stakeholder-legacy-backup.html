<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Deal Progress — Maxwell DealFlow</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
<style>
  :root{
    --bg:#0A0E14; --card:#161D28; --card2:#1E2636;
    --text1:#F1ECE3; --text2:#9CA3AF; --text3:#6B7280;
    --accent:#CC785C; --accent2:#D98B6F; --accent-dark:#B3654A;
    --green:#10B981; --yellow:#9CA3AF; --red:#B91C1C;
    --border:rgba(255,255,255,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text1);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
  .wrap{max-width:1400px;margin:0 auto;padding:24px 16px}
  .hero{background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dark) 100%);
    padding:32px;border-radius:20px;box-shadow:0 8px 32px rgba(204,120,92,.25);
    margin-bottom:24px}
  .hero h1{margin:0 0 6px;font-size:28px}
  .hero p{margin:0;opacity:.9;font-size:14px}
  .role-badge{display:inline-block;background:rgba(255,255,255,.18);
    padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;
    text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
  .offer-badge{display:inline-block;margin-top:14px;background:rgba(0,0,0,.28);padding:8px 14px;border-radius:24px;font-size:14px;font-weight:700;letter-spacing:.02em;border:1px solid rgba(255,255,255,.18)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:760px){.grid{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--border);
    border-radius:16px;padding:20px}
  .card h3{margin:0 0 14px;font-size:13px;text-transform:uppercase;
    letter-spacing:.08em;color:var(--text3)}
  .row{display:flex;justify-content:space-between;align-items:center;
    padding:10px 0;border-bottom:1px solid var(--border)}
  .row:last-child{border:0}
  .label{color:var(--text2);font-size:13px}
  .val{font-weight:600;font-size:14px}
  .progress-wrap{margin:18px 0}
  .progress-bar{background:var(--card2);border-radius:10px;height:10px;overflow:hidden}
  .progress-fill{background:linear-gradient(90deg,var(--accent),var(--accent2));
    height:100%;border-radius:10px;transition:width .6s ease}
  .progress-meta{display:flex;justify-content:space-between;
    margin-top:6px;font-size:12px;color:var(--text3)}
  .check{display:flex;align-items:center;gap:12px;padding:12px;
    border-radius:10px;background:var(--card2);margin-bottom:8px}
  .check.done{opacity:.55}
  .check-icon{width:22px;height:22px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;font-size:13px;font-weight:700;
    background:var(--card);border:2px solid var(--border)}
  .check.done .check-icon{background:var(--green);color:#fff;border-color:var(--green)}
  .check-text{flex:1;font-size:14px}
  .check.done .check-text{text-decoration:line-through}
  .check-due{font-size:11px;color:var(--text3)}
  .footer{text-align:center;color:var(--text3);font-size:12px;
    padding:24px 0;line-height:1.7}
  .footer a{color:var(--accent2);text-decoration:none}
  .panic{margin-top:14px;background:transparent;border:1px solid var(--red);
    color:var(--red);padding:10px 16px;border-radius:10px;cursor:pointer;
    font-size:13px;font-weight:600;width:100%}
  .panic:hover{background:var(--red);color:#fff}
  .err{text-align:center;padding:60px 20px}
  .err h2{color:var(--red);margin:0 0 10px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--card2);border:1px solid var(--border);padding:10px 18px;
    border-radius:10px;font-size:13px;z-index:99}
</style>
</head>
<body>
<div class="wrap" id="root">
  <div style="text-align:center;padding:80px 20px;color:var(--text2)">Loading…</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="js/stakeholder-portal.js"></script>
</body>
</html>
