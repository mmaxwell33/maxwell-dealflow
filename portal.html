<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Deal Progress — Maxwell DealFlow</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
<style>
  html,body{margin:0;padding:0;background:#0A0E14;color:#F1ECE3;
    font:15px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}
  .msg{max-width:480px;padding:32px}
  .msg h1{margin:0 0 8px;font-size:22px;color:#CC785C}
  .msg p{margin:0;color:#9CA3AF;font-size:14px}
  .spin{width:28px;height:28px;border:3px solid rgba(204,120,92,.2);
    border-top-color:#CC785C;border-radius:50%;
    animation:spin 0.8s linear infinite;margin:0 auto 18px}
  @keyframes spin{to{transform:rotate(360deg)}}
  a{color:#D98B6F;text-decoration:none}
</style>
</head>
<body>
<div class="msg">
  <div class="spin"></div>
  <h1>Redirecting to your portal…</h1>
  <p>One moment. If you are not redirected automatically,
     <a id="manual" href="stakeholder.html">tap here</a>.</p>
</div>
<script>
  (function(){
    var params = new URLSearchParams(location.search);
    var token = params.get('t') || '';
    var target = 'stakeholder.html' + (token ? ('?t=' + encodeURIComponent(token)) : '');
    var manual = document.getElementById('manual');
    if (manual) manual.href = target;
    location.replace(target);
  })();
</script>
</body>
</html>
